<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Operating System dashboard">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0B1226"/><stop offset="1" stop-color="#050816"/></linearGradient>
    <linearGradient id="neon" x1="70" y1="40" x2="1130" y2="480" gradientUnits="userSpaceOnUse"><stop stop-color="#00F5FF"/><stop offset=".5" stop-color="#A855F7"/><stop offset="1" stop-color="#FF7A18"/></linearGradient>
    <radialGradient id="r" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 260) scale(540 260)"><stop stop-color="#00F5FF" stop-opacity=".14"/><stop offset="1" stop-color="#00F5FF" stop-opacity="0"/></radialGradient>
    <style>.mono{font-family:'JetBrains Mono','Consolas',monospace}.sans{font-family:'Inter','Segoe UI',Arial,sans-serif}.bar{animation:bar 3s ease-in-out infinite}@keyframes bar{50%{width:260px}}.orb{animation:orb 6s linear infinite;transform-origin:600px 283px}.pulse{animation:p 2s ease-in-out infinite}@keyframes p{50%{opacity:.35}}</style>
  </defs>
  <rect width="1200" height="520" rx="32" fill="#030712"/>
  <rect width="1200" height="520" rx="32" fill="url(#r)"/>
  <rect x="45" y="40" width="1110" height="440" rx="28" fill="url(#panel)" stroke="url(#neon)" stroke-width="2"/>
  <text x="82" y="88" class="mono" font-size="15" fill="#67E8F9" letter-spacing="3">CORE ARCHITECTURE</text>
  <text x="82" y="130" class="sans" font-size="38" font-weight="800" fill="white">AI Operating System for Growth</text>
  <text x="84" y="163" class="mono" font-size="15" fill="#CBD5E1">from chaotic market signals to executable AI-powered systems</text>

  <g transform="translate(78 210)">
    <rect width="236" height="172" rx="22" fill="#07111F" stroke="#00F5FF" stroke-opacity=".6"/>
    <text x="24" y="40" class="mono" font-size="15" fill="#67E8F9">01 / SENSE</text>
    <text x="24" y="74" class="sans" font-size="22" font-weight="800" fill="white">Signal Mining</text>
    <text x="24" y="107" class="mono" font-size="13" fill="#94A3B8">social · search · market</text>
    <rect x="24" y="130" width="150" height="8" rx="4" fill="#102436"/><rect class="bar" x="24" y="130" width="205" height="8" rx="4" fill="#00F5FF" opacity=".75"/>
  </g>
  <g transform="translate(344 210)">
    <rect width="236" height="172" rx="22" fill="#07111F" stroke="#A855F7" stroke-opacity=".6"/>
    <text x="24" y="40" class="mono" font-size="15" fill="#D8B4FE">02 / PREDICT</text>
    <text x="24" y="74" class="sans" font-size="22" font-weight="800" fill="white">Trend Models</text>
    <text x="24" y="107" class="mono" font-size="13" fill="#94A3B8">patterns · timing · narrative</text>
    <path d="M24 135 L64 112 L105 126 L151 92 L209 105" stroke="#A855F7" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(610 210)">
    <rect width="236" height="172" rx="22" fill="#07111F" stroke="#22C55E" stroke-opacity=".6"/>
    <text x="24" y="40" class="mono" font-size="15" fill="#86EFAC">03 / BUILD</text>
    <text x="24" y="74" class="sans" font-size="22" font-weight="800" fill="white">AI Workflows</text>
    <text x="24" y="107" class="mono" font-size="13" fill="#94A3B8">agents · prompts · automation</text>
    <g fill="#22C55E" opacity=".82"><circle cx="42" cy="136" r="10"/><circle cx="96" cy="136" r="10"/><circle cx="150" cy="136" r="10"/><circle cx="204" cy="136" r="10"/></g>
    <path d="M52 136H86 M106 136H140 M160 136H194" stroke="#22C55E" stroke-width="3"/>
  </g>
  <g transform="translate(876 210)">
    <rect width="236" height="172" rx="22" fill="#07111F" stroke="#FF7A18" stroke-opacity=".65"/>
    <text x="24" y="40" class="mono" font-size="15" fill="#FDBA74">04 / DEPLOY</text>
    <text x="24" y="74" class="sans" font-size="22" font-weight="800" fill="white">Launch Engine</text>
    <text x="24" y="107" class="mono" font-size="13" fill="#94A3B8">content · funnels · growth</text>
    <path class="pulse" d="M50 147 C85 95, 150 95, 185 147" stroke="#FF7A18" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>

  <g class="orb">
    <circle cx="600" cy="283" r="198" stroke="#00F5FF" stroke-opacity=".12" stroke-width="1"/>
    <circle cx="798" cy="283" r="5" fill="#00F5FF"/>
  </g>
</svg>

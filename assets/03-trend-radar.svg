<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trend Radar">
  <defs>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(324 280) scale(255)">
      <stop stop-color="#00F5FF" stop-opacity=".33"/><stop offset="1" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="324" y1="280" x2="324" y2="38" gradientUnits="userSpaceOnUse"><stop stop-color="#00F5FF" stop-opacity=".8"/><stop offset="1" stop-color="#00F5FF" stop-opacity="0"/></linearGradient>
    <style>.mono{font-family:'JetBrains Mono','Consolas',monospace}.sans{font-family:'Inter','Segoe UI',Arial,sans-serif}.rot{animation:rot 5s linear infinite;transform-origin:324px 280px}@keyframes rot{to{transform:rotate(360deg)}}.blink{animation:b 1.9s ease-in-out infinite}@keyframes b{50%{opacity:.2}}</style>
  </defs>
  <rect width="1200" height="560" rx="32" fill="#030712"/>
  <rect x="44" y="40" width="1112" height="480" rx="28" fill="#07111F" stroke="#1F2A44"/>
  <text x="650" y="92" class="mono" font-size="15" fill="#67E8F9" letter-spacing="3">TREND INTELLIGENCE RADAR</text>
  <text x="650" y="136" class="sans" font-size="38" font-weight="800" fill="white">See signals before they become obvious</text>
  <text x="650" y="172" class="mono" font-size="15" fill="#94A3B8">A visual layer for scouting, decoding and prioritizing cultural/AI shifts.</text>

  <g transform="translate(0 0)">
    <circle cx="324" cy="280" r="238" fill="url(#core)"/>
    <circle cx="324" cy="280" r="238" stroke="#00F5FF" stroke-opacity=".28"/>
    <circle cx="324" cy="280" r="182" stroke="#00F5FF" stroke-opacity=".22"/>
    <circle cx="324" cy="280" r="126" stroke="#00F5FF" stroke-opacity=".18"/>
    <circle cx="324" cy="280" r="70" stroke="#00F5FF" stroke-opacity=".16"/>
    <path d="M86 280H562 M324 42V518 M156 112L492 448 M492 112L156 448" stroke="#00F5FF" stroke-opacity=".13"/>
    <path class="rot" d="M324 280 L324 42 A238 238 0 0 1 507 128 Z" fill="url(#beam)" opacity=".42"/>
    <circle cx="324" cy="280" r="8" fill="#00F5FF"/>
    <g fill="#A855F7">
      <circle class="blink" cx="425" cy="148" r="7"/><circle class="blink" cx="232" cy="232" r="6" style="animation-delay:.3s"/><circle class="blink" cx="381" cy="377" r="8" style="animation-delay:.6s"/><circle class="blink" cx="151" cy="340" r="5" style="animation-delay:.9s"/><circle class="blink" cx="511" cy="273" r="5" style="animation-delay:1.2s"/>
    </g>
  </g>

  <g transform="translate(650 220)">
    <rect width="430" height="62" rx="18" fill="#0B1226" stroke="#00F5FF" stroke-opacity=".45"/>
    <text x="24" y="38" class="mono" font-size="15" fill="#E0F2FE">emerging demand patterns</text>
    <rect y="82" width="430" height="62" rx="18" fill="#0B1226" stroke="#A855F7" stroke-opacity=".45"/>
    <text x="24" y="120" class="mono" font-size="15" fill="#F3E8FF">AI-native consumer behaviors</text>
    <rect y="164" width="430" height="62" rx="18" fill="#0B1226" stroke="#22C55E" stroke-opacity=".45"/>
    <text x="24" y="202" class="mono" font-size="15" fill="#DCFCE7">content velocity opportunities</text>
    <rect y="246" width="430" height="62" rx="18" fill="#0B1226" stroke="#FF7A18" stroke-opacity=".45"/>
    <text x="24" y="284" class="mono" font-size="15" fill="#FFEDD5">new market narratives</text>
  </g>
</svg>

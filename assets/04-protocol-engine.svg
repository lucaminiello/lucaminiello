<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Protocol Engine">
  <defs>
    <linearGradient id="g" x1="72" x2="1128" y1="88" y2="412" gradientUnits="userSpaceOnUse"><stop stop-color="#00F5FF"/><stop offset=".52" stop-color="#A855F7"/><stop offset="1" stop-color="#FF7A18"/></linearGradient>
    <style>.mono{font-family:'JetBrains Mono','Consolas',monospace}.sans{font-family:'Inter','Segoe UI',Arial,sans-serif}.flow{stroke-dasharray:14 16;animation:f 10s linear infinite}@keyframes f{to{stroke-dashoffset:-340}}.chip{animation:p 2.7s ease-in-out infinite}@keyframes p{50%{opacity:.5;transform:scale(.985)}}</style>
  </defs>
  <rect width="1200" height="500" rx="32" fill="#030712"/>
  <rect x="45" y="44" width="1110" height="412" rx="28" fill="#07111F" stroke="#24304C"/>
  <text x="86" y="92" class="mono" font-size="15" fill="#FDBA74" letter-spacing="3">EXECUTION PROTOCOL</text>
  <text x="86" y="135" class="sans" font-size="38" font-weight="800" fill="white">SENSE → PREDICT → ACCELERATE → DEPLOY</text>
  <text x="88" y="170" class="mono" font-size="15" fill="#94A3B8">A repeatable AI loop for strategy, automation and launch velocity.</text>
  <path class="flow" d="M174 300H1026" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <g class="chip" transform="translate(104 226)">
    <rect width="214" height="146" rx="24" fill="#0B1226" stroke="#00F5FF"/>
    <text x="36" y="46" class="mono" font-size="15" fill="#67E8F9">01</text><text x="36" y="82" class="sans" font-size="25" font-weight="800" fill="white">SENSE</text><text x="36" y="111" class="mono" font-size="13" fill="#94A3B8">read hidden signals</text>
  </g>
  <g class="chip" transform="translate(364 226)" style="animation-delay:.2s">
    <rect width="214" height="146" rx="24" fill="#0B1226" stroke="#A855F7"/>
    <text x="36" y="46" class="mono" font-size="15" fill="#D8B4FE">02</text><text x="36" y="82" class="sans" font-size="25" font-weight="800" fill="white">PREDICT</text><text x="36" y="111" class="mono" font-size="13" fill="#94A3B8">model next moves</text>
  </g>
  <g class="chip" transform="translate(624 226)" style="animation-delay:.4s">
    <rect width="214" height="146" rx="24" fill="#0B1226" stroke="#22C55E"/>
    <text x="36" y="46" class="mono" font-size="15" fill="#86EFAC">03</text><text x="36" y="82" class="sans" font-size="25" font-weight="800" fill="white">ACCELERATE</text><text x="36" y="111" class="mono" font-size="13" fill="#94A3B8">ship faster systems</text>
  </g>
  <g class="chip" transform="translate(884 226)" style="animation-delay:.6s">
    <rect width="214" height="146" rx="24" fill="#0B1226" stroke="#FF7A18"/>
    <text x="36" y="46" class="mono" font-size="15" fill="#FDBA74">04</text><text x="36" y="82" class="sans" font-size="25" font-weight="800" fill="white">DEPLOY</text><text x="36" y="111" class="mono" font-size="13" fill="#94A3B8">turn into traction</text>
  </g>
</svg>

<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luca Miniello ventures grid">
  <defs>
    <linearGradient id="stroke" x1="80" y1="62" x2="1120" y2="498" gradientUnits="userSpaceOnUse"><stop stop-color="#00F5FF"/><stop offset=".48" stop-color="#A855F7"/><stop offset="1" stop-color="#FF7A18"/></linearGradient>
    <style>.mono{font-family:'JetBrains Mono','Consolas',monospace}.sans{font-family:'Inter','Segoe UI',Arial,sans-serif}.card{animation:float 5s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}.gl{animation:p 2.4s ease-in-out infinite}@keyframes p{50%{opacity:.35}}</style>
  </defs>
  <rect width="1200" height="560" rx="32" fill="#030712"/>
  <rect x="44" y="42" width="1112" height="476" rx="28" fill="#07111F" stroke="url(#stroke)" stroke-width="2"/>
  <text x="82" y="96" class="mono" font-size="15" fill="#67E8F9" letter-spacing="3">VENTURE MAP</text>
  <text x="82" y="140" class="sans" font-size="40" font-weight="800" fill="white">Building brands, systems and intellectual property</text>
  <g transform="translate(84 205)">
    <g class="card">
      <rect width="316" height="210" rx="26" fill="#0B1226" stroke="#00F5FF" stroke-opacity=".7"/>
      <circle class="gl" cx="56" cy="55" r="18" fill="#00F5FF"/>
      <text x="88" y="62" class="sans" font-size="26" font-weight="800" fill="white">WeAreMira</text>
      <text x="32" y="110" class="mono" font-size="14" fill="#94A3B8">AI-powered innovation studio</text>
      <text x="32" y="142" class="mono" font-size="13" fill="#67E8F9">strategy · automations · launch</text>
    </g>
    <g class="card" transform="translate(366 0)" style="animation-delay:.25s">
      <rect width="316" height="210" rx="26" fill="#0B1226" stroke="#A855F7" stroke-opacity=".7"/>
      <circle class="gl" cx="56" cy="55" r="18" fill="#A855F7"/>
      <text x="88" y="62" class="sans" font-size="26" font-weight="800" fill="white">CEO Italia</text>
      <text x="32" y="110" class="mono" font-size="14" fill="#94A3B8">business media &amp; leadership layer</text>
      <text x="32" y="142" class="mono" font-size="13" fill="#D8B4FE">community · authority · content</text>
    </g>
    <g class="card" transform="translate(732 0)" style="animation-delay:.5s">
      <rect width="316" height="210" rx="26" fill="#0B1226" stroke="#FF7A18" stroke-opacity=".7"/>
      <circle class="gl" cx="56" cy="55" r="18" fill="#FF7A18"/>
      <text x="88" y="62" class="sans" font-size="26" font-weight="800" fill="white">AI IP Lab</text>
      <text x="32" y="110" class="mono" font-size="14" fill="#94A3B8">books, frameworks and playbooks</text>

<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Contribution engine placeholder">
  <defs>
    <linearGradient id="g" x1="80" x2="1120" y1="40" y2="420" gradientUnits="userSpaceOnUse"><stop stop-color="#00F5FF"/><stop offset=".52" stop-color="#A855F7"/><stop offset="1" stop-color="#FF7A18"/></linearGradient>
    <style>.mono{font-family:'JetBrains Mono','Consolas',monospace}.sans{font-family:'Inter','Segoe UI',Arial,sans-serif}.snake{stroke-dasharray:22 18;animation:s 6s linear infinite}@keyframes s{to{stroke-dashoffset:-180}}.dot{animation:p 2.8s ease-in-out infinite}@keyframes p{50%{opacity:.35}}</style>
  </defs>
  <rect width="1200" height="460" rx="32" fill="#030712"/>
  <rect x="44" y="42" width="1112" height="376" rx="28" fill="#07111F" stroke="url(#g)" stroke-width="2"/>
  <text x="82" y="96" class="mono" font-size="15" fill="#67E8F9" letter-spacing="3">CONTRIBUTION ENGINE</text>
  <text x="82" y="138" class="sans" font-size="38" font-weight="800" fill="white">The grid becomes part of the visual system</text>
  <text x="82" y="174" class="mono" font-size="15" fill="#94A3B8">Run the GitHub Action once to generate the live snake in the output branch.</text>
  <g transform="translate(92 230)">
    <rect width="990" height="90" rx="18" fill="#0B1226"/>
    <path class="snake" d="M35 50 C120 8, 180 90, 265 50 S410 8, 495 50 S640 90, 725 50 S870 8, 955 50" stroke="url(#g)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <g fill="#164E63" opacity=".95">
      <circle class="dot" cx="82" cy="50" r="5"/><circle class="dot" cx="143" cy="50" r="5" style="animation-delay:.15s"/><circle class="dot" cx="206" cy="50" r="5" style="animation-delay:.3s"/><circle class="dot" cx="331" cy="50" r="5" style="animation-delay:.45s"/><circle class="dot" cx="452" cy="50" r="5" style="animation-delay:.6s"/><circle class="dot" cx="570" cy="50" r="5" style="animation-delay:.75s"/><circle class="dot" cx="692" cy="50" r="5" style="animation-delay:.9s"/><circle class="dot" cx="815" cy="50" r="5" style="animation-delay:1.05s"/><circle class="dot" cx="930" cy="50" r="5" style="animation-delay:1.2s"/>
    </g>
  </g>
</svg>
